spring:
  application:
    name: gestion-empleados
  config:
    import: optional:classpath:application-secret.yml
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/empleados-db}
      auto-index-creation: false
      # Configuración de conexión pool para mejor rendimiento
      connection-string: ${MONGODB_URI:mongodb://localhost:27017/empleados-db}
      # Timeouts y configuración de reconexión
      connect-timeout-ms: 30000
      socket-timeout-ms: 30000
      max-pool-size: 20
      min-pool-size: 5
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
server:
  port: 8080

# Configuración de microservicios externos
services:
  departamentos:
    url: ${DEPARTAMENTOS_SERVICE_URL:http://localhost:8081}

app:
  messaging:
    exchange: ${EMPLEADOS_EVENTS_EXCHANGE:empleados.events}

logging:
  level:
    com.microservicios.empleados: INFO
    org.springframework.data.mongodb: INFO
    io.opentelemetry: INFO
  # Structured JSON logging with traceId
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# ============================================
# Actuator Configuration - Health & Metrics
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: "health,metrics,prometheus,info,env"
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
    info:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: "50ms,100ms,200ms,500ms,1000ms,2000ms,5000ms"
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

# ============================================
# OpenTelemetry Configuration
# ============================================
otel:
  sdk:
    disabled: false
  exporter:
    otlp:
      enabled: true
      protocol: http/protobuf
      endpoint: http://zipkin:9411  # Zipkin HTTP collector
  traces:
    sampler: always_on  # Change to parentbased_probabilistic in production
  service:
    name: gestion-empleados
    version: 1.0.0
  resource:
    attributes:
      service.namespace: microservicios
      deployment.environment: development

# Configuración de Springdoc OpenAPI (Swagger)
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    show-logo: true
    syntaxHighlight:
      activate: true
    theme: light
  api-docs:
    path: /v3/api-docs
  show-actuator: true

