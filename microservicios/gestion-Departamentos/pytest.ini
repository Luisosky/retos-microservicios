[pytest]
# Configuración de pytest para el proyecto

# Directorio donde buscar los tests
testpaths = tests

# Patrón de archivos de prueba
python_files = test_*.py

# Patrón de clases de prueba
python_classes = Test*

# Patrón de funciones de prueba
python_functions = test_*

# Opciones de salida
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:cacheprovider

# Marcadores personalizados
markers =
    unit: Pruebas unitarias
    integration: Pruebas de integración
    slow: Pruebas que tardan más tiempo en ejecutarse

# Configuración de cobertura (cuando se usa pytest-cov)
[coverage:run]
source = app
omit = 
    */tests/*
    */migrations/*
    */__init__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    pass
