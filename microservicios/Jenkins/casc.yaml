jenkins:
  systemMessage: "Jenkins preconfigurado con JCasC para CI de microservicios"
  numExecutors: 2
  mode: NORMAL

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "nicolasAdmin"
          password: "omar"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: "jwt-secret-key"
              secret: "${JWT_SECRET}"
              description: "JWT secret para pruebas de integracion"
          - string:
              scope: GLOBAL
              id: "sonarqube-token"
              secret: "${SONARQUBE_TOKEN}"
              description: "Token para SonarQube"

unclassified:
  location:
    url: "http://localhost:9090/"
  sonarGlobalConfiguration:
    buildWrapperEnabled: false
    installations:
      - name: "SonarQube"
        serverUrl: "http://sonarqube:9000"
        credentialsId: "sonarqube-token"
        mojoVersion: ""

jobs:
  - script: |
      def repoUrl = System.getenv('GIT_REPO_URL') ?: 'file:///workspace/repo'

      pipelineJob('gestion-empleados-ci') {
        description('Pipeline CI declarativo: build, SonarQube, package Docker y E2E BDD (Reto 6).')
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url(repoUrl)
                }
                branches('*/main')
              }
            }
            scriptPath('microservicios/gestion-empleados/Jenkinsfile')
            lightweight(true)
          }
        }
      }