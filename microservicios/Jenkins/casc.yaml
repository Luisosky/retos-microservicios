jenkins:
  systemMessage: "Jenkins pre-configurado con JCasC - Microservicios Pipeline"
  
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "nicolasAdmin"
          password: "omar"

  authorizationStrategy:
    roleBased:
      roles:
        global:
          - name: "admin"
            description: "Acceso total para Nicolas"
            permissions:
              - "hudson.model.Hudson.Administer"
            # LAS ASIGNACIONES VAN AQUÍ ADENTRO, NO AFUERA:
            assignments:
              - "nicolasAdmin"
          - name: "developer"
            description: "Rol de lectura y ejecución"
            permissions:
              - "hudson.model.Hudson.Read"
              - "hudson.model.Item.Read"
              - "hudson.model.Item.Build"
            assignments:
              - "developer-user"

# Configuración de credenciales
credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: "jwt-secret-key"
              secret: "${JWT_SECRET}"
          - string:
              scope: GLOBAL
              id: "sonarqube-token"
              secret: "${SONARQUBE_TOKEN}"

# Configuración de trabajos
jobs:
  - script: >
      pipelineJob('Prueba-Docker') {
        definition {
          cps {
            script("pipeline { agent any; stages { stage('Test') { steps { sh 'docker --version' } } } }")
            sandbox(true)
          }
        }
      }