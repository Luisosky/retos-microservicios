# Configuración de Prometheus para el ecosistema de microservicios (Reto 7)
# =========================================================================
#
# - Cada microservicio expone /metrics (o /actuator/prometheus para Spring Boot)
#   y se scrapea por nombre de servicio de la red Docker `microservices-net`.
# - La etiqueta `service` se inyecta vía relabel_configs para que las consultas
#   PromQL del dashboard puedan agrupar por servicio sin depender del job_name.
#
# Ojo: este archivo se monta en /etc/prometheus/prometheus.yml dentro del
# contenedor `prometheus-server`, así que la URL de cada target usa nombres
# de servicio compose (resoluble por DNS interno) y NO localhost.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'microservices-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ==========================================
  # Microservicios de negocio
  # ==========================================

  # Java / Spring Boot — métricas expuestas por Micrometer
  - job_name: 'empleados-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['empleados-service:8080']
    relabel_configs:
      - target_label: service
        replacement: 'empleados-service'

  # Python / FastAPI — prometheus_client
  - job_name: 'departamentos-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['departamentos:8081']
    relabel_configs:
      - target_label: service
        replacement: 'departamentos-service'

  # Python / FastAPI — prometheus_client
  - job_name: 'notificaciones-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['notificaciones:8082']
    relabel_configs:
      - target_label: service
        replacement: 'notificaciones-service'

  # ASP.NET Core — prometheus-net.AspNetCore
  - job_name: 'autenticacion-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['autenticacion-service:8084']
    relabel_configs:
      - target_label: service
        replacement: 'autenticacion-service'

  # PHP / Laravel — exporter custom (MetricsController)
  - job_name: 'perfiles-service'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['perfiles-service:8083']
    relabel_configs:
      - target_label: service
        replacement: 'perfiles-service'
