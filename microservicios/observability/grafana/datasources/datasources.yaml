apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    uid: prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s

  - name: Loki
    type: loki
    access: proxy
    uid: loki
    url: http://loki:3100
    isDefault: false
    editable: true
    jsonData:
      derivedFields:
        # Permite click → "trace" desde un log si la línea contiene traceId
        - name: traceId
          matcherRegex: "traceId=([a-f0-9]+)"
          url: "$${__value.raw}"
          datasourceUid: zipkin

  - name: Zipkin
    type: zipkin
    access: proxy
    uid: zipkin
    url: http://zipkin:9411
    isDefault: false
    editable: true
