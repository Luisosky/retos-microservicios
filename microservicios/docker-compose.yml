services:
  # =========================
  # Servicios de Infraestructura
  # =========================
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    command: redis-server
    volumes:
      - redis_data:/data
    networks:
      - microservices-net
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-broker
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"   # Puerto de mensajería (AMQP)
      - "15672:15672" # Interfaz web de administración
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================
  # Microservicios
  # =========================

  # Servicio en Java (Spring Boot) - Publicador de eventos
  empleados-service:
    build:
      context: ./gestion-empleados
    container_name: empleados-service
    environment:
      # MongoDB Atlas Configuration
      MONGODB_URI: ${MONGODB_URI}
      SPRING_DATA_MONGODB_DATABASE: ${MONGODB_DATABASE}
      # Redis Configuration
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
      # RabbitMQ Configuration
      SPRING_RABBITMQ_HOST: rabbitmq-broker
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
      # Microservices Communication
      DEPARTAMENTOS_SERVICE_URL: http://departamentos:8081
      SERVER_PORT: 8080
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      departamentos:
        condition: service_healthy
    networks:
      - microservices-net
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v3/api-docs"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # Servicio en Python (FastAPI)
  departamentos:
    build:
      context: ./gestion-Departamentos
    container_name: departamentos
    environment:
      # Supabase PostgreSQL Connection
      DEP_DATABASE_URL: ${DEP_DATABASE_URL}
      # RabbitMQ Configuration (si llega a consumir eventos)
      RABBITMQ_HOST: rabbitmq-broker
    networks:
      - microservices-net
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Servicio de Notificaciones (consumidor de eventos)
  notificaciones:
    build:
      context: ./gestion-notificaciones
    container_name: notificaciones
    env_file:
      - ./.env
    environment:
      RABBITMQ_HOST: rabbitmq-broker
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
      NOTIF_EXCHANGE: empleados.events
      NOTIF_QUEUE: notificaciones.queue
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices-net
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Servicio de Perfiles (Laravel PHP) - Consumidor de eventos y CRUD de perfiles
  perfiles:
    build:
      context: ./gestion-perfiles
    container_name: perfiles-service
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${PERFILES_APP_KEY:-base64:changeme00000000000000000000000000000000000=}
      APP_URL: http://localhost:8083
      DB_CONNECTION: mysql
      DB_HOST: mysql-perfiles
      DB_PORT: 3306
      DB_DATABASE: ${PERFILES_DB_DATABASE:-gestion_perfiles}
      DB_USERNAME: ${PERFILES_DB_USERNAME:-perfiles_user}
      DB_PASSWORD: ${PERFILES_DB_PASSWORD:-perfiles_pass}
      RABBITMQ_HOST: rabbitmq-broker
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
      RABBITMQ_EXCHANGE: empleados.events
      RABBITMQ_QUEUE: perfiles.queue
      EMPLEADOS_SERVICE_URL: http://empleados-service:8080
      DEPARTAMENTOS_SERVICE_URL: http://departamentos:8081
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql-perfiles:
        condition: service_healthy
    networks:
      - microservices-net
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  mysql-perfiles:
    image: mysql:8.0
    container_name: mysql-perfiles
    environment:
      MYSQL_ROOT_PASSWORD: ${PERFILES_MYSQL_ROOT_PASSWORD:-root_pass}
      MYSQL_DATABASE: ${PERFILES_DB_DATABASE:-gestion_perfiles}
      MYSQL_USER: ${PERFILES_DB_USERNAME:-perfiles_user}
      MYSQL_PASSWORD: ${PERFILES_DB_PASSWORD:-perfiles_pass}
    volumes:
      - mysql_perfiles_data:/var/lib/mysql
    networks:
      - microservices-net
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# =========================
# Red interna
# =========================
networks:
  microservices-net:
    driver: bridge

# =========================
# Volúmenes de persistencia
# =========================
volumes:
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  mysql_perfiles_data:
    driver: local