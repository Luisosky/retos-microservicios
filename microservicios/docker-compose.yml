services:
  # =========================
  # Servicios de Infraestructura
  # =========================
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    command: redis-server
    volumes:
      - redis_data:/data
    networks:
      - microservices-net
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-broker
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"   # Puerto de mensajería (AMQP)
      - "15672:15672" # Interfaz web de administración
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================
  # Microservicios
  # =========================

  # Servicio en Java (Spring Boot) - Publicador de eventos
  empleados-service:
    build:
      context: ./gestion-empleados
    container_name: empleados-service
    environment:
      # MongoDB Atlas Configuration
      MONGODB_URI: ${MONGODB_URI}
      SPRING_DATA_MONGODB_DATABASE: ${MONGODB_DATABASE}
      # Redis Configuration
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
      # RabbitMQ Configuration
      SPRING_RABBITMQ_HOST: rabbitmq-broker
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
      # Microservices Communication
      DEPARTAMENTOS_SERVICE_URL: http://departamentos:8081
      SERVER_PORT: 8080
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      departamentos:
        condition: service_healthy
    networks:
      - microservices-net
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v3/api-docs"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # Servicio en Python (FastAPI)
  departamentos:
    build:
      context: ./gestion-Departamentos
    container_name: departamentos
    environment:
      # Supabase PostgreSQL Connection
      DEP_DATABASE_URL: ${DEP_DATABASE_URL}
      # RabbitMQ Configuration (si llega a consumir eventos)
      RABBITMQ_HOST: rabbitmq-broker
    networks:
      - microservices-net
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Servicio de Notificaciones (consumidor de eventos)
  notificaciones:
    build:
      context: ./gestion-notificaciones
    container_name: notificaciones
    env_file:
      - ./.env
    environment:
      RABBITMQ_HOST: rabbitmq-broker
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
      NOTIF_EXCHANGE: empleados.events
      NOTIF_QUEUE: notificaciones.queue
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices-net
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Servicio de Autenticacion en C# (ASP.NET Core)
  autenticacion:
    build:
      context: ./servicio-Autenticación
    container_name: autenticacion-service
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8084
      AUTH_DATABASE_URL: ${AUTH_DATABASE_URL}
      JWT_ISSUER: auth-service
      JWT_AUDIENCE: microservices-clients
      JWT_SECRET: ${JWT_SECRET:-CHANGE_THIS_SECRET_IN_ENV}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-60}
      RESET_TOKEN_EXPIRATION_MINUTES: ${RESET_TOKEN_EXPIRATION_MINUTES:-30}
      RABBITMQ_HOST: rabbitmq-broker
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
      AUTH_EXCHANGE: empleados.events
      AUTH_QUEUE: auth.queue
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices-net
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Servicio de Perfiles en PHP (Laravel) - Consumidor y API
  perfiles:
    build:
      context: ./gestion-perfiles
    container_name: perfiles-service
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${PERFILES_LARAVEL_APP_KEY:-}
      APP_URL: http://localhost:8083
      EMPLEADOS_SERVICE_URL: http://empleados-service:8080

      DB_CONNECTION: pgsql
      DATABASE_URL: ${PERFILES_DATABASE_URL:-${PERFILES_APP_KEY}}

      RABBITMQ_HOST: rabbitmq-broker
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
      RABBITMQ_EXCHANGE: empleados.events
      RABBITMQ_QUEUE: perfiles.queue

      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - microservices-net
    ports:
      - "8083:8083"
    volumes:
      - ./gestion-perfiles/storage:/var/www/storage
      - ./gestion-perfiles/bootstrap/cache:/var/www/bootstrap/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Interfaz web (React + Vite)
  interfaz:
    image: node:20-alpine
    container_name: interfaz-web
    working_dir: /app
    command: sh -c "npm ci --frozen-lockfile && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./interfaces/reac/auraRRHH/auraRRHH:/app
      - frontend-node-modules:/app/node_modules
    networks:
      - microservices-net
    ports:
      - "5173:5173"
    depends_on:
      autenticacion:
        condition: service_healthy
      empleados-service:
        condition: service_healthy
      departamentos:
        condition: service_healthy
      notificaciones:
        condition: service_healthy
      perfiles:
        condition: service_healthy
    restart: unless-stopped

  
# =========================
# Red interna
# =========================
networks:
  microservices-net:
    driver: bridge

# =========================
# Volúmenes de persistencia
# =========================
volumes:
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  frontend-node-modules:
    driver: local
