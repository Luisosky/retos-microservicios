services:
  # =========================
  # Bases de datos
  # =========================
  mongodb-empleados:
    image: mongo:7
    container_name: mongodb-empleados
    environment:
      MONGO_INITDB_DATABASE: empleados-db
    volumes:
      - mongodb_empleados_data:/data/db
    networks:
      - microservices-net
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - microservices-net
    ports:
      - "6379:6379"

  database-departamentos:
    image: postgres:16
    container_name: database-departamentos
    environment:
      POSTGRES_DB: ${DEP_DB_NAME:-departamentos_db}
      POSTGRES_USER: ${DEP_DB_USER:-departamentos_user}
      POSTGRES_PASSWORD: ${DEP_DB_PASSWORD:-departamentos_password}
    volumes:
      - departamentos_db_data:/var/lib/postgresql/data
    networks:
      - microservices-net
    # No exponemos el puerto al host (solo acceso interno)
    # ports:
    #   - "5433:5432"

  # =========================
  # Microservicios
  # =========================
  empleados-service:
    build:
      context: ./gestion-empleados
    container_name: empleados-service
    environment:
      MONGODB_URI: ${MONGODB_URI}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
    depends_on:
      - redis
    networks:
      - microservices-net
    ports:
      - "8080:8080"

  departamentos-service:
    build:
      context: ./gestion-departamentos
    container_name: departamentos-service
    environment:
      DB_HOST: database-departamentos
      DB_PORT: 5432
      DB_NAME: ${DEP_DB_NAME:-departamentos_db}
      DB_USER: ${DEP_DB_USER:-departamentos_user}
      DB_PASSWORD: ${DEP_DB_PASSWORD:-departamentos_password}
    depends_on:
      - database-departamentos
    networks:
      - microservices-net
    ports:
      - "8081:8000" # expone solo la API al host

# =========================
# Red interna
# =========================
networks:
  microservices-net:
    driver: bridge

# =========================
# Volúmenes de persistencia
# =========================
volumes:
  mongodb_empleados_data:
  departamentos_db_data: