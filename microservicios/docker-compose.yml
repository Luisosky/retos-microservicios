services:
  # =========================
  # Bases de datos
  # =========================
  database-empleados:
    image: postgres:16
    container_name: database-empleados
    environment:
      POSTGRES_DB: ${EMP_DB_NAME:-empleados_db}
      POSTGRES_USER: ${EMP_DB_USER:-empleados_user}
      POSTGRES_PASSWORD: ${EMP_DB_PASSWORD:-empleados_password}
    volumes:
      - empleados_db_data:/var/lib/postgresql/data
    networks:
      - microservices-net
    # No exponemos el puerto al host (solo acceso interno)
    # ports:
    #   - "5432:5432"

  database-departamentos:
    image: postgres:16
    container_name: database-departamentos
    environment:
      POSTGRES_DB: ${DEP_DB_NAME:-departamentos_db}
      POSTGRES_USER: ${DEP_DB_USER:-departamentos_user}
      POSTGRES_PASSWORD: ${DEP_DB_PASSWORD:-departamentos_password}
    volumes:
      - departamentos_db_data:/var/lib/postgresql/data
    networks:
      - microservices-net
    # No exponemos el puerto al host (solo acceso interno)
    # ports:
    #   - "5433:5432"

  # =========================
  # Microservicios
  # =========================
  empleados-service:
    build:
      context: ./gestion-empleado
    container_name: empleados-service
    environment:
      DB_HOST: database-empleados
      DB_PORT: 5432
      DB_NAME: ${EMP_DB_NAME:-empleados_db}
      DB_USER: ${EMP_DB_USER:-empleados_user}
      DB_PASSWORD: ${EMP_DB_PASSWORD:-empleados_password}
    depends_on:
      - database-empleados
    networks:
      - microservices-net
    ports:
      - "8080:8000" # expone solo la API al host

  departamentos-service:
    build:
      context: ./gestion-departamentos
    container_name: departamentos-service
    environment:
      DB_HOST: database-departamentos
      DB_PORT: 5432
      DB_NAME: ${DEP_DB_NAME:-departamentos_db}
      DB_USER: ${DEP_DB_USER:-departamentos_user}
      DB_PASSWORD: ${DEP_DB_PASSWORD:-departamentos_password}
    depends_on:
      - database-departamentos
    networks:
      - microservices-net
    ports:
      - "8081:8000" # expone solo la API al host

# =========================
# Red interna
# =========================
networks:
  microservices-net:
    driver: bridge
    internal: true

# =========================
# Volúmenes de persistencia
# =========================
volumes:
  empleados_db_data:
  departamentos_db_data: