# Ejemplo de configuración SonarQube para un microservicio Go
# Copiar este archivo como sonar-project.properties en el proyecto Go real

sonar.projectKey=go-microservice-example
sonar.projectName=Go Microservice Example
sonar.projectVersion=1.0.0
sonar.sourceEncoding=UTF-8

# Código fuente y pruebas
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Reportes de Go
# Genera cobertura con: go test ./... -coverprofile=coverage.out
# Genera ejecución con: go test ./... -json > test-report.json
sonar.go.coverage.reportPaths=coverage.out
sonar.go.tests.reportPaths=test-report.json

# Exclusiones típicas
sonar.exclusions=**/*_test.go,**/vendor/**,**/bin/**,**/dist/**
sonar.test.exclusions=**/vendor/**
